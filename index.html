<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ぴよスノボ</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#bfe3f7; touch-action:none; overscroll-behavior:none;
    font-family:'BIZ UDPGothic','Hiragino Maru Gothic ProN','Yu Gothic',sans-serif; user-select:none; -webkit-user-select:none; }
  #gameCanvas { position:fixed; inset:0; width:100%; height:100%; display:block; }

  .overlay { position:fixed; inset:0; pointer-events:none; z-index:10; }

  /* ---------- HUD ---------- */
  #hud { position:fixed; top:calc(8px + env(safe-area-inset-top)); left:0; right:0; display:flex; justify-content:space-between;
    padding:0 16px; z-index:12; pointer-events:none; }
  .hudBox { background:rgba(255,255,255,.75); border-radius:14px; padding:6px 14px; font-weight:700;
    color:#3c5a78; font-size:18px; box-shadow:0 2px 8px rgba(80,120,160,.25); }
  #speedBox span { color:#e8628a; }
  #scoreBox span { color:#f0a020; font-size:22px; }

  /* ---------- 信号 ---------- */
  #signal { position:fixed; top:16%; left:50%; transform:translateX(-50%); display:none; z-index:14;
    background:#4a5568; border-radius:18px; padding:14px 18px; box-shadow:0 6px 20px rgba(0,0,0,.35); }
  #signal .lamps { display:flex; gap:14px; }
  .lamp { width:34px; height:34px; border-radius:50%; background:#2d3440; border:3px solid #1c2230; transition:background .1s, box-shadow .1s; }
  .lamp.on { background:#ff4b4b; box-shadow:0 0 16px 4px rgba(255,80,80,.8); }

  /* ---------- 中央メッセージ ---------- */
  #centerMsg { position:fixed; top:34%; left:50%; transform:translate(-50%,-50%) scale(1); z-index:15;
    font-size:min(13vw,84px); font-weight:700; color:#fff; text-shadow:0 4px 0 rgba(60,110,160,.5), 0 0 24px rgba(255,255,255,.6);
    -webkit-text-stroke:3px #4a90d9; opacity:0; pointer-events:none; white-space:nowrap; }
  #centerMsg.flying { -webkit-text-stroke:3px #d94a4a; }
  @keyframes popMsg { 0%{opacity:0; transform:translate(-50%,-50%) scale(.4);} 15%{opacity:1; transform:translate(-50%,-50%) scale(1.15);} 25%{transform:translate(-50%,-50%) scale(1);} 80%{opacity:1;} 100%{opacity:0; transform:translate(-50%,-50%) scale(1.05);} }
  #centerMsg.show { animation:popMsg 1.1s ease-out forwards; }

  /* ---------- トリック名ポップ ---------- */
  #trickPop { position:fixed; top:22%; left:50%; transform:translateX(-50%); z-index:15; pointer-events:none;
    font-size:min(8vw,52px); font-weight:700; color:#fff; -webkit-text-stroke:2.5px #f08030;
    text-shadow:0 3px 0 rgba(180,90,0,.4), 0 0 18px rgba(255,200,120,.7); opacity:0; white-space:nowrap; }
  @keyframes trickAnim { 0%{opacity:0; transform:translateX(-50%) translateY(18px) scale(.5);} 12%{opacity:1; transform:translateX(-50%) translateY(0) scale(1.1);} 22%{transform:translateX(-50%) scale(1);} 75%{opacity:1;} 100%{opacity:0; transform:translateX(-50%) translateY(-14px);} }
  #trickPop.show { animation:trickAnim 1s ease-out forwards; }
  #comboPop { position:fixed; top:31%; left:50%; transform:translateX(-50%); z-index:15; pointer-events:none;
    font-size:min(5vw,30px); font-weight:700; color:#fff; -webkit-text-stroke:2px #9b59d0; opacity:0; }
  #comboPop.show { animation:trickAnim .9s ease-out forwards; }

  /* ---------- スワイプガイド ---------- */
  .guide { position:fixed; bottom:12%; left:50%; transform:translateX(-50%); z-index:13; pointer-events:none;
    display:none; flex-direction:column; align-items:center; gap:6px; }
  .guide .bubble { background:rgba(255,255,255,.9); border-radius:18px; padding:10px 22px; font-size:min(4.5vw,24px);
    font-weight:700; color:#3c5a78; box-shadow:0 3px 10px rgba(80,120,160,.3); border:3px solid #8fc7ee; text-align:center; }
  .guide .bubble small { display:block; font-size:.62em; color:#7a92a8; font-weight:400; margin-top:2px; }
  .swipeIcon { width:72px; height:96px; position:relative; }
  .swipeIcon .finger { position:absolute; left:50%; top:0; width:34px; height:34px; margin-left:-17px; border-radius:50%;
    background:#ffd76e; border:3px solid #f0a020; animation:swipeDown 1.1s ease-in-out infinite; }
  .swipeIcon .arrow { position:absolute; left:50%; top:6px; margin-left:-9px; width:18px; height:78px; }
  .swipeIcon .arrow::before { content:''; position:absolute; left:6px; top:0; width:6px; height:58px; background:rgba(255,255,255,.85); border-radius:3px; }
  .swipeIcon .arrow::after { content:''; position:absolute; left:0; bottom:0; border-left:9px solid transparent; border-right:9px solid transparent; border-top:16px solid rgba(255,255,255,.85); }
  @keyframes swipeDown { 0%{transform:translateY(0); opacity:0;} 15%{opacity:1;} 70%{transform:translateY(58px); opacity:1;} 100%{transform:translateY(62px); opacity:0;} }
  #airGuide .cross { width:96px; height:96px; position:relative; }
  #airGuide .cross i { position:absolute; background:rgba(255,255,255,.9); border-radius:4px; }
  #airGuide .cross i.v { left:44px; top:6px; width:8px; height:84px; }
  #airGuide .cross i.h { top:44px; left:6px; height:8px; width:84px; }
  #airGuide .cross b { position:absolute; width:0; height:0; }

  /* ---------- タイトル ---------- */
  #titleScreen { position:fixed; inset:0; z-index:30; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(#9fd4f5 0%, #cfeaff 55%, #ffffff 100%); gap:18px; }
  #titleScreen h1 { font-size:min(15vw,86px); color:#fff; -webkit-text-stroke:4px #58a8e0;
    text-shadow:0 6px 0 rgba(70,130,190,.45), 0 0 30px rgba(255,255,255,.8); font-weight:700; letter-spacing:.04em; }
  #titleScreen .chick { font-size:min(18vw,96px); animation:bob 1.6s ease-in-out infinite; filter:drop-shadow(0 6px 4px rgba(90,140,190,.3)); }
  @keyframes bob { 0%,100%{transform:translateY(0) rotate(-6deg);} 50%{transform:translateY(-14px) rotate(6deg);} }
  #titleScreen .howto { background:rgba(255,255,255,.85); border-radius:16px; padding:12px 22px; color:#3c5a78;
    font-size:min(3.8vw,18px); line-height:1.75; box-shadow:0 3px 12px rgba(80,130,180,.25); text-align:left; }
  #tapStart { margin-top:6px; background:linear-gradient(#ffd76e,#f5b942); border:none; border-radius:999px;
    padding:16px 52px; min-height:56px; font-family:inherit; font-size:min(6vw,28px); font-weight:700; color:#7a5410;
    box-shadow:0 6px 0 #d99a2b, 0 8px 16px rgba(120,90,20,.3); cursor:pointer; animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
  #tapStart:active { transform:translateY(4px); box-shadow:0 2px 0 #d99a2b; }

  /* ---------- リザルト ---------- */
  #resultPanel { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(.8); z-index:28;
    background:rgba(255,255,255,.95); border-radius:24px; padding:26px 40px; text-align:center; min-width:290px;
    box-shadow:0 10px 40px rgba(60,100,150,.4); border:4px solid #8fc7ee; opacity:0; pointer-events:none;
    transition:opacity .35s, transform .35s; }
  #resultPanel.show { opacity:1; transform:translate(-50%,-50%) scale(1); pointer-events:auto; }
  #resultPanel h2 { color:#4a90d9; font-size:30px; margin-bottom:6px; }
  #resultRank { font-size:64px; font-weight:700; line-height:1.1; color:#f0a020; text-shadow:0 3px 0 rgba(200,140,20,.3); }
  #resultDetail { color:#5a7590; font-size:16px; margin:8px 0 14px; line-height:1.7; }
  #retryBtn { background:linear-gradient(#7ec8f5,#4a9de0); border:none; border-radius:999px; padding:14px 44px;
    min-height:52px; font-family:inherit; font-size:22px; font-weight:700; color:#fff; cursor:pointer;
    box-shadow:0 5px 0 #2f7cba, 0 8px 14px rgba(50,110,170,.35); }
  #retryBtn:active { transform:translateY(4px); box-shadow:0 1px 0 #2f7cba; }

  /* ---------- 横持ちヒント ---------- */
  #rotateHint { position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center;
    background:rgba(60,90,120,.92); color:#fff; font-size:22px; font-weight:700; text-align:center; line-height:2; }
  @media (orientation:portrait) { #rotateHint { display:flex; } }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div class="hudBox" id="speedBox">スピード <span id="speedVal">0</span></div>
  <div class="hudBox" id="scoreBox">スコア <span id="scoreVal">0</span></div>
</div>

<div id="signal"><div class="lamps">
  <div class="lamp"></div><div class="lamp"></div><div class="lamp"></div><div class="lamp"></div><div class="lamp"></div>
</div></div>

<div id="centerMsg"></div>
<div id="trickPop"></div>
<div id="comboPop"></div>

<div class="guide" id="accelGuide">
  <div class="swipeIcon"><div class="arrow"></div><div class="finger"></div></div>
  <div class="bubble">下にスワイプで かそく！<small>れんぞくスワイプで もっと はやく</small></div>
</div>

<div class="guide" id="airGuide">
  <div class="bubble">スワイプで わざ！<small>たて＝ちゅうがえり ／ よこ＝スピン ／ ななめ＝ミックス</small></div>
</div>

<div class="guide" id="brakeGuide">
  <div class="swipeIcon"><div class="arrow"></div><div class="finger"></div></div>
  <div class="bubble">下にスワイプで ブレーキ！<small>かべに ぶつかるまえに とまろう</small></div>
</div>

<div id="titleScreen">
  <div class="chick">🐤</div>
  <h1>ぴよスノボ</h1>
  <div class="howto">
    ① しんごうが きえたら スタート！<br>
    ② 下スワイプで かそく → ジャンプ！<br>
    ③ 空中で スワイプして わざを きめよう<br>
    ④ さいごは 下スワイプで ブレーキ！
  </div>
  <button id="tapStart">タップで スタート</button>
</div>

<div id="resultPanel">
  <h2 id="resultTitle">ゴール！</h2>
  <div id="resultRank">S</div>
  <div id="resultDetail"></div>
  <button id="retryBtn">もういちど</button>
</div>

<div id="rotateHint">📱⟳<br>iPadを よこもちに してね</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
'use strict';
/* =========================================================
   ぴよスノボ  ―  ぴよランナー２外伝
   単一HTML / Three.js r128 / iPad横持ち / 120Hz対応(dtScale)
   ========================================================= */

/* ---------- 基本セットアップ ---------- */
const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xaedcf5);
scene.fog = new THREE.Fog(0xaedcf5, 60, 190);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 500);

const sun = new THREE.DirectionalLight(0xfff4dc, 1.0);
sun.position.set(-30, 60, -20);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xcfe4ff, 0.75));
const fill = new THREE.DirectionalLight(0xbfd8ff, 0.35);
fill.position.set(25, 30, 40);
scene.add(fill);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

/* ---------- コース形状 ----------
   z+方向へ滑走。groundY(z)で高さを定義し、メッシュも物理も同じ関数を使う */
const LIP_Z = 112;        // ジャンプ台の先端
const FLAT_Z = 210;       // 平地開始
const WALL_Z = 300;       // フィニッシュ壁
const FLAT_Y = -50.9;

function groundY(z){
  if (z < 100) return -0.18 * z;                                  // 助走スロープ
  if (z < LIP_Z) { const t = (z-100)/12; return -18 + 4.5*t*t; }  // キッカー(上向きカーブ)
  if (z < 180) return -16 - (z-LIP_Z)*0.42;                       // ランディングバーン
  if (z < FLAT_Z) { const t = z-180; return -44.56 - 0.42*t + 0.42*t*t/60; } // 平地へ緩和
  return FLAT_Y;                                                  // 減速ゾーン
}
function groundSlope(z){ const e=0.25; return (groundY(z+e)-groundY(z-e))/(2*e); }

/* 雪面メッシュ生成（両端をせり上げてバンク風に） */
(function buildCourse(){
  const W = 60, ZN = 340, XN = 24, zStep = (WALL_Z+40)/ZN;
  const geo = new THREE.PlaneGeometry(W, WALL_Z+40, XN, ZN);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;
  for (let i=0; i<pos.count; i++){
    const x = pos.getX(i);
    const z = pos.getZ(i) + (WALL_Z+40)/2 - 10;   // z: -10 〜 WALL_Z+30
    pos.setZ(i, z);
    let y = groundY(Math.max(0, Math.min(z, WALL_Z+30)));
    const ax = Math.abs(x);
    if (ax > 8) y += Math.pow((ax-8)/10, 2.2) * 6;   // 雪バンク
    pos.setY(i, y);
  }
  geo.computeVertexNormals();
  const mat = new THREE.MeshLambertMaterial({ color:0xf7fbff });
  scene.add(new THREE.Mesh(geo, mat));

  // 滑走ラインのうっすら圧雪跡
  const laneGeo = new THREE.PlaneGeometry(3.4, WALL_Z+20, 1, 300);
  laneGeo.rotateX(-Math.PI/2);
  const lp = laneGeo.attributes.position;
  for (let i=0; i<lp.count; i++){
    const z = lp.getZ(i) + (WALL_Z+20)/2 - 5;
    lp.setZ(i, z);
    lp.setY(i, groundY(Math.max(0,Math.min(z,WALL_Z+20))) + 0.06);
  }
  laneGeo.computeVertexNormals();
  scene.add(new THREE.Mesh(laneGeo, new THREE.MeshLambertMaterial({ color:0xe4f1fb })));

  // キッカー先端の赤ライン
  const lipMark = new THREE.Mesh(new THREE.BoxGeometry(6, 0.15, 0.5),
    new THREE.MeshLambertMaterial({ color:0xff6b6b }));
  lipMark.position.set(0, groundY(LIP_Z)+0.1, LIP_Z-0.3);
  lipMark.rotation.x = -Math.atan(groundSlope(LIP_Z));
  scene.add(lipMark);
})();

/* ---------- テキスト入りバナー ---------- */
function makeBanner(text, w, h, bg, fg){
  const cv = document.createElement('canvas'); cv.width = 512; cv.height = 128;
  const c = cv.getContext('2d');
  c.fillStyle = bg; c.fillRect(0,0,512,128);
  c.fillStyle = fg; c.font = "bold 84px 'BIZ UDPGothic', sans-serif";
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(text, 256, 70);
  const tex = new THREE.CanvasTexture(cv);
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map:tex, side:THREE.DoubleSide }));
  return m;
}

/* スタートゲート */
(function(){
  const poleMat = new THREE.MeshLambertMaterial({ color:0x6fb1e0 });
  for (const sx of [-4.5, 4.5]){
    const p = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,6,10), poleMat);
    p.position.set(sx, groundY(2)+3, 2);
    scene.add(p);
  }
  const b = makeBanner('START', 10, 2.2, '#4a9de0', '#ffffff');
  b.position.set(0, groundY(2)+6, 2);
  scene.add(b);
})();

/* フィニッシュ壁＋バナー＋観客 */
const crowdGroup = new THREE.Group();
(function(){
  const wall = new THREE.Mesh(new THREE.BoxGeometry(24, 5, 2.4),
    new THREE.MeshLambertMaterial({ color:0xdbeefc }));
  wall.position.set(0, FLAT_Y+2.5, WALL_Z+1.2);
  scene.add(wall);
  const b = makeBanner('FINISH', 16, 2.4, '#ff8fb0', '#ffffff');
  b.position.set(0, FLAT_Y+3.6, WALL_Z-0.1);
  scene.add(b);

  // 観客（カラフルなまるっこい鳥たち）
  const cols = [0xffd76e, 0xff9db8, 0x9bd7ff, 0xb8f0c0, 0xe0c4ff, 0xffc6a0];
  for (let i=0; i<64; i++){
    const side = i%2 ? 1 : -1;
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.55, 10, 8),
      new THREE.MeshLambertMaterial({ color: cols[i%cols.length] }));
    body.scale.y = 1.1; g.add(body);
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.07,6,6),
      new THREE.MeshBasicMaterial({ color:0x333333 }));
    eye.position.set(side*-0.2, 0.15, -0.45); g.add(eye);
    const eye2 = eye.clone(); eye2.position.x = side*-0.45; g.add(eye2);
    g.position.set(side*(9.5+Math.random()*4), 0, 215+Math.random()*80);
    g.position.y = groundY(g.position.z) + 0.55 + Math.pow((Math.abs(g.position.x)-8)/10,2.2)*6;
    g.userData.baseY = g.position.y;
    g.userData.ph = Math.random()*Math.PI*2;
    crowdGroup.add(g);
  }
  scene.add(crowdGroup);
})();

/* 木・のぼり旗 */
(function(){
  const trunkMat = new THREE.MeshLambertMaterial({ color:0x9a7050 });
  const leafMat = new THREE.MeshLambertMaterial({ color:0x7fc8a0 });
  for (let i=0; i<26; i++){
    const side = i%2 ? 1 : -1;
    const z = 6 + Math.random()*260;
    const x = side*(11+Math.random()*7);
    const g = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.35,1.6,7), trunkMat);
    trunk.position.y = 0.8; g.add(trunk);
    const s = 1.4 + Math.random()*1.4;
    for (let k=0;k<3;k++){
      const cone = new THREE.Mesh(new THREE.ConeGeometry(s*(1-k*0.24), s*1.15, 8), leafMat);
      cone.position.y = 1.4 + k*s*0.72;
      g.add(cone);
    }
    // 雪のせ
    const snow = new THREE.Mesh(new THREE.ConeGeometry(s*0.4, s*0.5, 8),
      new THREE.MeshLambertMaterial({ color:0xffffff }));
    snow.position.y = 1.4 + 2*s*0.72 + s*0.5;
    g.add(snow);
    g.position.set(x, groundY(z) + Math.pow((Math.abs(x)-8)/10,2.2)*6, z);
    scene.add(g);
  }
  // のぼり旗（ランディング横）
  const flagCols = [0xff8fb0, 0x7ec8f5, 0xffd76e];
  for (let i=0; i<8; i++){
    const side = i%2?1:-1;
    const z = 125 + i*10;
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,3.4,6),
      new THREE.MeshLambertMaterial({ color:0xffffff }));
    const fl = new THREE.Mesh(new THREE.PlaneGeometry(1.5,0.9),
      new THREE.MeshLambertMaterial({ color: flagCols[i%3], side:THREE.DoubleSide }));
    fl.position.set(side*-0.8, 1.2, 0);
    const g = new THREE.Group(); g.add(pole); g.add(fl);
    g.position.set(side*7.5, groundY(z)+1.7, z);
    scene.add(g);
  }
})();

/* ---------- ぴよ（プロシージャル生成） ---------- */
const piyo = new THREE.Group();        // コース上の位置
const tiltG = new THREE.Group();       // 斜面追従の傾き
const spinYG = new THREE.Group();      // 横回転（スピン）
const spinXG = new THREE.Group();      // 縦回転（宙返り）
const model = new THREE.Group();       // 本体
piyo.add(tiltG); tiltG.add(spinYG); spinYG.add(spinXG); spinXG.add(model);
scene.add(piyo);

(function buildPiyo(){
  const yellow = new THREE.MeshLambertMaterial({ color:0xffe45c });
  const orange = new THREE.MeshLambertMaterial({ color:0xff9d42 });
  const black  = new THREE.MeshBasicMaterial({ color:0x3a3a3a });
  const white  = new THREE.MeshLambertMaterial({ color:0xffffff });
  const pink   = new THREE.MeshLambertMaterial({ color:0xffb3c8 });

  const body = new THREE.Mesh(new THREE.SphereGeometry(1, 20, 16), yellow);
  body.scale.set(1, 1.06, 1); body.position.y = 1.05;
  model.add(body);

  // 羽
  for (const s of [-1,1]){
    const wing = new THREE.Mesh(new THREE.SphereGeometry(0.42, 12, 10), yellow);
    wing.scale.set(0.5, 0.95, 0.72);
    wing.position.set(s*0.95, 1.0, -0.1);
    wing.rotation.z = s*-0.45;
    model.add(wing);
  }
  // とさか的な羽毛
  for (let k=0;k<3;k++){
    const tuft = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.32, 6), yellow);
    tuft.position.set((k-1)*0.16, 2.06, -0.05);
    tuft.rotation.x = (k-1)*0.25; tuft.rotation.z = (k-1)*-0.3;
    model.add(tuft);
  }
  // くちばし
  const beak = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.34, 8), orange);
  beak.rotation.x = Math.PI/2;
  beak.position.set(0, 1.22, 0.98);
  model.add(beak);
  // ほっぺ
  for (const s of [-1,1]){
    const ch = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 8), pink);
    ch.scale.z = 0.4; ch.position.set(s*0.5, 1.08, 0.83);
    model.add(ch);

/* ---------- サウンド（Web Audio / チップチューン） ---------- */
const AC = window.AudioContext || window.webkitAudioContext;
let ac = null, master = null, bgm = null;
function initAudio(){
  if (ac) { if (ac.state === 'suspended') ac.resume(); return; }
  ac = new AC();
  master = ac.createGain(); master.gain.value = 0.55; master.connect(ac.destination);
}
function beep(freq, dur, type, vol, when){
  if (!ac) return;
  const t = when || ac.currentTime;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol||0.2, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t+dur+0.02);
}
function noiseBuf(){
  const b = ac.createBuffer(1, ac.sampleRate*1.2, ac.sampleRate);
  const d = b.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  return b;
}
let _noise = null;
function playNoise(dur, f0, f1, vol, q){
  if (!ac) return;
  if (!_noise) _noise = noiseBuf();
  const t = ac.currentTime;
  const src = ac.createBufferSource(); src.buffer = _noise; src.loop = true;
  const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = q||1;
  bp.frequency.setValueAtTime(f0, t);
  bp.frequency.exponentialRampToValueAtTime(Math.max(40,f1), t+dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  src.connect(bp); bp.connect(g); g.connect(master);
  src.start(t); src.stop(t+dur+0.05);
}
const SFX = {
  lamp(){ beep(430, 0.12, 'square', 0.18); },
  go(){ beep(880, 0.35, 'square', 0.25); beep(1320, 0.3, 'square', 0.12, ac?ac.currentTime+0.02:0); },
  flying(){ beep(220, 0.3, 'sawtooth', 0.22); beep(180, 0.35, 'sawtooth', 0.18, ac?ac.currentTime+0.12:0); },
  push(){ playNoise(0.22, 500, 1600, 0.22, 1.2); },
  jump(){ if(!ac)return; const t=ac.currentTime; const o=ac.createOscillator(),g=ac.createGain();
    o.type='square'; o.frequency.setValueAtTime(320,t); o.frequency.exponentialRampToValueAtTime(920,t+0.22);
    g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+0.32); },
  whoosh(){ playNoise(0.3, 2400, 500, 0.3, 2.5); },
  land(){ playNoise(0.28, 300, 90, 0.4, 0.8); beep(120, 0.15, 'triangle', 0.2); },
  brake(){ playNoise(0.35, 900, 2400, 0.2, 1.4); },
  crash(){ playNoise(0.6, 220, 60, 0.55, 0.7); beep(90, 0.4, 'sawtooth', 0.3); },
  trickDing(n){ beep(660 + n*110, 0.14, 'square', 0.16); beep(990 + n*110, 0.16, 'square', 0.1, ac?ac.currentTime+0.07:0); },
  cheer(big){
    if(!ac) return;
    const dur = big ? 2.2 : 1.4;
    playNoise(dur, 900, 2600, big?0.34:0.22, 0.6);
    const n = big ? 12 : 7;
    for (let i=0;i<n;i++){
      const t = ac.currentTime + Math.random()*dur*0.7;
      beep(700+Math.random()*900, 0.1+Math.random()*0.1, 'triangle', 0.06, t);
    }
    if (big){
      beep(523,0.14,'square',0.14, ac.currentTime+0.1);
      beep(659,0.14,'square',0.14, ac.currentTime+0.24);
      beep(784,0.14,'square',0.14, ac.currentTime+0.38);
      beep(1046,0.3,'square',0.18, ac.currentTime+0.52);
    }
  }
};

/* BGM：かんたんシーケンサ（8分音符・148bpm・8小節ループ） */
function startBGM(){
  if (!ac || bgm) return;
  const bpm = 148, step = 60/bpm/2;
  // C長調のポップなメロディ（0=休符）
  const mel = [
    523,0,659,0, 784,659,523,0,  587,0,698,0, 880,698,587,0,
    523,0,659,0, 784,880,1046,0, 988,880,784,659, 587,659,523,0,
    659,0,784,0, 880,784,659,0,  698,0,880,0, 1046,880,698,0,
    784,659,523,659, 784,880,1046,988, 880,0,784,0, 659,587,523,0
  ];
  const bass = [131,0,196,0, 147,0,220,0, 131,0,196,0, 175,0,196,0];
  let i = 0, next = ac.currentTime + 0.1;
  bgm = { stop:false, gain: ac.createGain() };
  bgm.gain.gain.value = 0.5; bgm.gain.connect(master);
  function schedule(){
    if (!bgm || bgm.stop) return;
    while (next < ac.currentTime + 0.25){
      const m = mel[i % mel.length];
      if (m){
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'square'; o.frequency.value = m;
        g.gain.setValueAtTime(0.07, next);
        g.gain.exponentialRampToValueAtTime(0.001, next+step*0.9);
        o.connect(g); g.connect(bgm.gain);
        o.start(next); o.stop(next+step);
      }
      const b = bass[i % bass.length];
      if (b){
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'triangle'; o.frequency.value = b;
        g.gain.setValueAtTime(0.12, next);
        g.gain.exponentialRampToValueAtTime(0.001, next+step*1.6);
        o.connect(g); g.connect(bgm.gain);
        o.start(next); o.stop(next+step*1.8);
      }
      if (i % 4 === 0) { // ハイハット風
        const t = next;
        playNoiseTick(t);
      }
      next += step; i++;
    }
    bgm.timer = setTimeout(schedule, 60);
  }
  function playNoiseTick(t){
    if (!_noise) _noise = noiseBuf();
    const src = ac.createBufferSource(); src.buffer = _noise;
    const hp = ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 6000;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.05);
    src.connect(hp); hp.connect(g); g.connect(bgm.gain);
    src.start(t); src.stop(t+0.06);
  }
  schedule();
}
function setBgmVolume(v){ if (bgm) bgm.gain.gain.setTargetAtTime(v, ac.currentTime, 0.3); }

/* ---------- 入力（スワイプ） ---------- */
let ptr = { down:false, x0:0, y0:0, x:0, y:0, t0:0, consumed:false };
const SWIPE_MIN = 34;

function onDown(x, y){
  initAudio(); startBGM();
  ptr.down = true; ptr.consumed = false;
  ptr.x0 = ptr.x = x; ptr.y0 = ptr.y = y; ptr.t0 = performance.now();
}
function onMove(x, y){
  if (!ptr.down) return;
  ptr.x = x; ptr.y = y;
  const dx = x - ptr.x0, dy = y - ptr.y0;
  const d = Math.hypot(dx, dy);
  // フライング判定：信号中に動いたら
  if (G.phase === 'signal' && d > 24 && !ptr.consumed){
    ptr.consumed = true;
    falseStart();
    return;
  }
  // 連続スワイプ対応：一定距離動くたびに発火して基準点を更新
  if (!ptr.consumed && d > SWIPE_MIN){
    handleSwipe(dx, dy);
    ptr.x0 = x; ptr.y0 = y;   // 連続入力用にリセット
  }
}
function onUp(x, y){
  if (!ptr.down) return;
  ptr.down = false;
  const dx = x - ptr.x0, dy = y - ptr.y0;
  if (!ptr.consumed && Math.hypot(dx,dy) > SWIPE_MIN*0.7){
    handleSwipe(dx, dy);
  }
}
function handleSwipe(dx, dy){
  switch (G.phase){
    case 'accel':
      if (dy > SWIPE_MIN*0.7 && Math.abs(dy) > Math.abs(dx)*0.8){
        G.spd = Math.min(34, G.spd + 3.4);
        SFX.push();
        burstSpray(piyo.position.x, piyo.position.y, piyo.position.z-0.5, 5, 0.7);
        model.position.y = -0.16;   // プッシュのしゃがみ（updateで戻す）
      }
      break;
    case 'air':
      doTrick(dx, dy);
      break;
    case 'runout':
      if (dy > SWIPE_MIN*0.7){
        G.spd = Math.max(0, G.spd - 5.4);
        SFX.brake();
        burstSpray(piyo.position.x, piyo.position.y, piyo.position.z+0.6, 12, 1.1);
        G.wobble = 0.25;
      }
      break;
  }
}

/* ---------- トリック ---------- */
const TAU = Math.PI*2;
function doTrick(dx, dy){
  const ax = Math.abs(dx), ay = Math.abs(dy);
  let name = '', base = 0;
  if (ay > ax*1.8){
    // 縦回転
    if (dy > 0){ G.airRotXT += TAU; name = '前宙（フロントフリップ）！'; }
    else       { G.airRotXT -= TAU; name = 'バク宙（バックフリップ）！'; }
    base = 100;
  } else if (ax > ay*1.8){
    // 横回転
    const s = dx > 0 ? 1 : -1;
    G.airRotYT += s*TAU;
    name = '360スピン！';
    base = 100;
  } else {
    // 複合（ななめ）
    G.airRotXT += (dy>0?1:-1)*TAU;
    G.airRotYT += (dx>0?1:-1)*TAU;
    name = 'コルクスクリュー！';
    base = 220;
  }
  G.comboN++;
  const pts = Math.round(base * (1 + (G.comboN-1)*0.5));
  G.score += pts;
  G.trickCount++;
  $('scoreVal').textContent = G.score;
  showTrick(name);
  if (G.comboN >= 2) showCombo(G.comboN, pts);
  SFX.whoosh();
  SFX.trickDing(G.comboN);
}

/* ---------- 着地・結果 ---------- */
function landNow(){
  // 回転を最寄りの一回転単位へスナップ
  const nx = Math.round(G.airRotXT/TAU)*TAU;
  const ny = Math.round(G.airRotYT/TAU)*TAU;
  const offX = Math.abs(spinXG.rotation.x - nx);
  const offY = Math.abs(spinYG.rotation.y - ny);
  const off = Math.max(offX, offY);
  G.airRotXT = nx; G.airRotYT = ny;

  G.phase = 'runout';
  G.slowmo = false; G.timeScale = 1;
  G.vy = 0;
  SFX.land();
  burstSpray(piyo.position.x, piyo.position.y, piyo.position.z, 16, 1.4);

  if (off < 0.55){
    G.landQuality = 'クリーン';
    G.score += 150;
    showCenter('ナイスランディング！');
    SFX.cheer(false);
  } else if (off < 1.5){
    G.landQuality = 'よろけ';
    G.score += 40;
    showCenter('おっとっと…！');
    G.wobble = 1.0;
  } else {
    G.landQuality = 'ギリギリ';
    showCenter('あぶなーい！');
    G.wobble = 1.6;
    G.spd = Math.max(6, G.spd*0.8);
  }
  $('scoreVal').textContent = G.score;
  setGuide('airGuide', false);
  setGuide('brakeGuide', true);
}

function crashRecover(){
  // 失敗でも前向きに：ひと呼吸おいて歓声＆ジャンプ
  G.phase = 'result'; G.celebT = 0;
  SFX.cheer(true);
  showCenter('ドンマイ！ ナイスチャレンジ！');
  burstConfetti(piyo.position.x, piyo.position.y+3, piyo.position.z, 70);
  setTimeout(showResult, 2400);
}
function showResult(){
  if (G.resultShown) return;
  G.resultShown = true;
  const s = G.score;
  let rank = 'C';
  if (s >= 1100) rank = 'S';
  else if (s >= 750) rank = 'A';
  else if (s >= 400) rank = 'B';
  $('resultTitle').textContent = G.crashed ? 'ナイスチャレンジ！' : 'ゴール！';
  $('resultRank').textContent = rank;
  $('resultDetail').innerHTML =
    `スコア <b style="color:#f0a020">${s}</b><br>` +
    `わざ ${G.trickCount}回 ／ 着地：${G.landQuality || '-'}<br>` +
    (G.crashed ? 'つぎは とまれるかな？' : 'かんぺきな しあがり！');
  $('resultPanel').classList.add('show');
  setBgmVolume(0.5);
}
$('retryBtn').addEventListener('click', () => { resetGame(); });
$('tapStart').addEventListener('click', () => {
  initAudio(); startBGM();
  $('titleScreen').style.display = 'none';
  resetGame();
});

/* ---------- カメラ ---------- */
const camPos = new THREE.Vector3(0, 8, -10);
const camLook = new THREE.Vector3(0, 0, 10);
function updateCamera(dtReal){
  const p = piyo.position;
  let tx=0, ty=6.2, tz=-10.5, lx=0, ly=1.2, lz=9, fov=72;
  if (G.phase === 'signal' || G.phase === 'title'){
    tx=4.5; ty=3.6; tz=-6; lx=0; ly=1.4; lz=3; fov=62;
  } else if (G.phase === 'accel' || G.phase === 'ride'){
    fov = 70 + G.spd*0.5;
    ty = 5.6; tz = -10 - G.spd*0.06;
  } else if (G.phase === 'air'){
    if (G.slowmo){ tx=4.2; ty=3.4; tz=-8.2; fov=58; ly=2.2; lz=4; }
    else { ty=6.8; tz=-13.5; fov=82; ly=2.5; lz=8; }
  } else if (G.phase === 'runout'){
    fov = 68 + G.spd*0.4; ty=5.4; tz=-10;
  } else if (G.phase === 'crashing' || G.phase === 'result'){
    tx=5.5; ty=3.4; tz=-7.5; lx=0; ly=1.4; lz=2; fov=58;
  }
  const k = 1 - Math.exp(-5.5*dtReal);
  camPos.lerp(new THREE.Vector3(p.x+tx, p.y+ty, p.z+tz), k);
  camLook.lerp(new THREE.Vector3(p.x+lx, p.y+ly, p.z+lz), k);
  camera.position.copy(camPos);
  camera.lookAt(camLook);
  camera.fov += (fov - camera.fov) * Math.min(1, 4*dtReal);
  camera.updateProjectionMatrix();
}

/* ---------- メインループ ---------- */
let lastT = performance.now();
const GRAV = 30;

function tick(now){
  requestAnimationFrame(tick);
  // 120Hz iPad対応：実時間ベースのdt（上限クランプ）
  let dtReal = (now - lastT) / 1000;
  lastT = now;
  if (dtReal > 0.05) dtReal = 0.05;

  // スローモー
  const targetTS = (G.phase === 'air' && G.slowmo) ? 0.32 : 1;
  G.timeScale += (targetTS - G.timeScale) * Math.min(1, 8*dtReal);
  const dt = dtReal * G.timeScale;

  /* --- フェーズ更新 --- */
  if (G.phase === 'accel' || G.phase === 'ride'){
    // 斜面加速＋空気抵抗
    const sl = groundSlope(G.z);
    G.spd += (-sl) * 14 * dt;
    G.spd -= G.spd * 0.06 * dt;
    G.spd = Math.max(4, Math.min(36, G.spd));
    G.z += G.spd * dt;
    G.y = groundY(G.z);

    // ガイド表示制御
    if (G.phase === 'accel'){
      G.guideT += dt;
      if (G.guideT > 4.5 || G.z > 60) setGuide('accelGuide', false);  // ガイドは先にフェードアウト
      if (G.z > G.accelUntilZ) G.phase = 'ride';                      // スワイプ受付はキッカー手前まで
    }
    // プッシュしゃがみ戻し
    model.position.y += (0 - model.position.y) * Math.min(1, 10*dt);
    // 斜面に姿勢を合わせる
    tiltG.rotation.x += (-Math.atan(sl) - tiltG.rotation.x) * Math.min(1, 10*dt);
    // カービングっぽい揺れ
    model.rotation.z = Math.sin(now*0.004) * 0.05;

    // 踏み切り
    if (G.z >= LIP_Z){
      G.phase = 'air';
      G.vy = G.spd * 0.72;   // 踏み切り角 ≒ 36°ぶんの上向き速度
      G.comboN = 0;
      SFX.jump();
      setGuide('airGuide', true);
      showCenter('ジャンプ！');
      tiltG.rotation.x = 0;
    }
  }
  else if (G.phase === 'air'){
    G.z += G.spd * dt;
    G.vy -= GRAV * dt;
    G.y += G.vy * dt;

    // 回転の追従（きびきび）
    const rate = 11.5;   // rad/s ≒ 660°/s
    const dxr = G.airRotXT - spinXG.rotation.x;
    spinXG.rotation.x += Math.sign(dxr) * Math.min(Math.abs(dxr), rate*dt);
    const dyr = G.airRotYT - spinYG.rotation.y;
    spinYG.rotation.y += Math.sign(dyr) * Math.min(Math.abs(dyr), rate*dt);

    // 着地が近づいたらスローモー
    const h = G.y - groundY(G.z);
    if (G.vy < 0 && h < 7 && !G.slowmo && G.z > LIP_Z+4){
      G.slowmo = true;
      setGuide('airGuide', false);
    }
    // 着地
    if (G.vy < 0 && G.y <= groundY(G.z) && G.z > LIP_Z+3){
      G.y = groundY(G.z);
      landNow();
    }
  }
  else if (G.phase === 'runout'){
    // 残り回転をすばやく収める
    const rate = 16;
    const dxr = G.airRotXT - spinXG.rotation.x;
    spinXG.rotation.x += Math.sign(dxr)*Math.min(Math.abs(dxr), rate*dt);
    const dyr = G.airRotYT - spinYG.rotation.y;
    spinYG.rotation.y += Math.sign(dyr)*Math.min(Math.abs(dyr), rate*dt);

    const sl = groundSlope(G.z);
    G.spd += (-sl) * 12 * dt;
    G.spd -= (1.4 + G.spd*0.03) * dt;       // 自然減速は弱め→ブレーキ必須
    G.spd = Math.max(0, G.spd);
    G.z += G.spd * dt;
    G.y = groundY(G.z);
    tiltG.rotation.x += (-Math.atan(sl) - tiltG.rotation.x) * Math.min(1, 10*dt);

    // よろけ演出
    if (G.wobble > 0){
      G.wobble -= dt;
      model.rotation.z = Math.sin(now*0.03) * 0.35 * Math.max(0, G.wobble);
    } else model.rotation.z *= 0.9;

    // 判定
    if (G.z >= WALL_Z - 1.6){
      if (G.spd > 2.5) startCrash();
      else { G.z = WALL_Z - 1.8; startStop(); }
    } else if (G.spd <= 0.25 && G.z > FLAT_Z - 15){
      startStop();
    }
  }
  else if (G.phase === 'crashing'){
    G.crashT += dt;
    if (G.crashT < 1.0){
      // はねかえって転がる
      G.z = Math.min(WALL_Z-1.6, G.z);
      G.z -= 6 * dt * (1 - G.crashT);
      model.position.y = Math.abs(Math.sin(G.crashT*10)) * 0.8 * (1-G.crashT);
      spinXG.rotation.x += 9 * dt;
      spinYG.rotation.y += 4 * dt;
      G.y = groundY(G.z);
      if (G.crashT < 0.3) burstSpray(piyo.position.x, piyo.position.y, piyo.position.z, 4, 1.3);
    } else if (G.crashT < 1.9){
      // ちょっと間（しーん…）
    } else {
      // 立ち上がって前向きエンド
      spinXG.rotation.x = 0; spinYG.rotation.y = 0;
      model.position.y = 0;
      crashRecover();
    }
  }
  else if (G.phase === 'result'){
    G.celebT += dt;
    // ぴよ喜びジャンプ（3回ホップ）
    const hop = Math.abs(Math.sin(G.celebT * 5.5)) * (G.celebT < 2.4 ? 0.9 : 0.2);
    model.position.y = hop;
    if (G.celebT % 0.9 < dt*1.1) burstConfetti(piyo.position.x, piyo.position.y+3.5, piyo.position.z, 14);
  }

  /* --- 共通更新 --- */
  piyo.position.set(0, G.y, G.z);
  $('speedVal').textContent = Math.round(G.spd * 3);

  // 観客ぴょこぴょこ（結果・着地後は激しく）
  const excite = (G.phase === 'result' || G.phase === 'runout') ? 1.6 : 0.5;
  for (const c of crowdGroup.children){
    c.position.y = c.userData.baseY + Math.abs(Math.sin(now*0.006 + c.userData.ph)) * 0.35 * excite;
  }
  // 雪を降らせる（カメラ周辺でループ）
  {
    const arr = snowPts.geometry.attributes.position.array;
    for (let i=0;i<arr.length;i+=3){
      arr[i+1] -= (2.2 + (i%5)) * dtReal * 0.6;
      arr[i] += Math.sin(now*0.001 + i)*0.01;
      if (arr[i+1] < camera.position.y - 22){
        arr[i+1] = camera.position.y + 22;
        arr[i] = camera.position.x + (Math.random()-0.5)*70;
        arr[i+2] = camera.position.z + (Math.random()-0.3)*110;
      }
    }
    snowPts.geometry.attributes.position.needsUpdate = true;
  }
  updateConfetti(dtReal);
  updateSpray(dtReal);
  updateCamera(dtReal);
  renderer.render(scene, camera);
}

/* 初期カメラ位置 */
piyo.position.set(0, groundY(4), 4);
camPos.set(4.5, groundY(4)+3.6, -2);
camLook.set(0, groundY(4)+1.4, 7);
requestAnimationFrame(tick);
</script>
